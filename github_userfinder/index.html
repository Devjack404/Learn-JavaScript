<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github User Finder</title>
  <link rel="stylesheet" type="" href="styles.css"> 
</head>

<!-- Header -->
<header>
  <h1>Github User Finder</h1>
</header>

<!-- Body -->
<body>
  <div class="container">
    <label for="name">Account Name :</label>
    <input type="text" id="input" placeholder="Enter Your User Name...">
    <button type="button" id='findBtn'>Find Now</button>
  </div> 

  <!-- profile card -->
  <div class="profile-card">
    <div class="profile-identity">
      <img class="photo" src="" alt="foto-avatar" style="width : 100px;">
      <div class="profile-info">
       <h2 class="username">User</h2>
       <p></p>
       <p></p>
       <p></p>
      </div>
    </div>

    <!-- porfile stats -->
    <div>
      <div class="stat">
        <span class="stat-value">230K</span>
        <span class="stat-label">Followers</span>
      </div>
      <div class="stat">
        <span class="stat-value">0</span>
        <span class="stat-label">Following</span>
      </div>
    </div>

    <!-- profile Meta -->
    <div class="profile-meta">
      <p class="live">📍 Portland, OR</p>
    </div>
  </div>

   
    <script src="script.js"></script>
</body>
</html>
