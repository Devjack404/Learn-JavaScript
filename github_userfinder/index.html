<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github User Finder</title>
  <link rel="stylesheet" type="text/css" href="styles.css"> 
  <link rel="stylesheet" type="text/css" href="repo-card.css"> 
  <link rel="stylesheet" type="text/css" href="drop-down.css"> 
</head>

<body>
  <!-- HEADER WEBSITE  -->
  <h1>Git User Finder</h1>
  <div class="container">
    <label for="input">Account Name</label>
    <div class="input-row">
      <input type="text" id="input" placeholder="Enter username...">
      <button type="button" id="findBtn">Find Now</button>
    </div>
  </div>


  <!-- PROFILE CARD -->
  <div class="profile-card">
    <div class="custom-dropdown" id="myDropdownWrapper">
      <!-- Tombol Trigger -->
      <button class="custom-dropdown-btn" id="dropdownTrigger">
        <span id="dropdownSelectedText">Pilih Tampilan</span>
        <!-- Ikon Panah Bawah -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/>
        </svg>
      </button>

      <!-- Menu Konten Dropdown -->
      <div class="custom-dropdown-menu" id="dropdownMenu">
        <button class="custom-dropdown-item active-item" onclick="selectOption(this, 'Profile')">
          👤 Profile
        </button>
        <button class="custom-dropdown-item" onclick="selectOption(this, 'Top Repository')">
          📁 Top Repository
        </button>
      </div>

    </div>
    

    <!-- PROFILE MINI IDENTITY -->
    <div class="profile-identity">
      <img class="photo" src="https://static.thenounproject.com/png/profile-icon-icon-638636-512.png" alt="foto-avatar">
      <div class="profile-info">
        <h2 class="username">Username</h2>
        <p class="nameTag">@username</p>
        <p class="bio">Bio User...</p>
        <button type="button" class="link-account" aria-label="Visit GitHub Profile">
          Visit Profile
          <svg xmlns="http://www.w3.org/2000/svg" id="svg-link" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 1rem;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"></path>
          </svg>
        </button>
      </div>
    </div>

      <!-- PROFILE STATS -->
    <div class="profile-stats">
      <div class="stat">
        <span class="followers-value stat-value">0</span>
        <span class="stat-label">Followers</span>
      </div>
      <div class="stat">
        <span class="following-value stat-value">0</span>
        <span class="stat-label">Following</span>
      </div>
      <div class="stat">
        <span class="repos-value stat-value">0</span>
        <span class="stat-label">Repos</span>
      </div>
    </div>

    <!-- <div class="profile-contributions">
      <h3>Contributions (Last Year)</h3>
      <img src="https://github-readme-stats.vercel.app/api?username=example&show_icons=true&count_private=true&include_all_commits=true&bg_color=08091a&title_color=c760b0&text_color=f0e6ff&icon_color=e491c9&hide_border=true" id="contributionGraph"  alt="Contribution Graph">
    </div> -->

    <!-- PROFILE META FOOTER -->
    <div class="profile-meta">
      <p class="location-user"> Location</p>
      <p class="joined"> Joined</p>
    </div>
  </div>


  <!-- TOP REPOSITORY CARD -->
  <div class="repository-card">
    <div class="profile-header">
      <label for="chs-repo">View</label>
      <select name="chs-repo" id="chs-repo">
        <option value="profile">Profile</option>
        <option value="repos">Top Repository</option>
      </select>
    </div>
  
    <!-- MINI IDENTITY -->
    <div class="profile-identity">
      <div class="profile-info">
        <h2 class="username-repo">Username</h2>
        <p class="nameTag-repo">@username</p>
        <p class="bio-repo">Bio User...</p>
        <button type="button" class="link-account-repo" aria-label="Visit GitHub Profile">
          Visit Profile
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 1rem;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
          </svg>
        </button>
      </div>
    </div>
  
    <!-- STATS -->
    <div class="profile-stats">
      <div class="stat">
        <span class="followers-value stat-value">0</span>
        <span class="stat-label">Followers</span>
      </div>
      <div class="stat">
        <span class="following-value stat-value">0</span>
        <span class="stat-label">Following</span>
      </div>
      <div class="stat">
        <span class="repos-value stat-value">0</span>
        <span class="stat-label">Repos</span>
      </div>
    </div>
  
    <!-- REPO LIST -->
    <div class="section-label">Top Repositories</div>
  
    <div class="repo-list">
      <!-- Diisi oleh JavaScript -->
    </div>
    
    <!-- META FOOTER -->
    <div class="profile-meta">
      <p class="location-user">Location</p>
      <p class="joined">Joined</p>
    </div>
  
  </div>

  <script type="module" src="script.js"></script>
  <script src="dropdown.js"></script>
</body>
</html>
